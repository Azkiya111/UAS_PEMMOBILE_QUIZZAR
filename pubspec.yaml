name: quiz_pengetahuan_umum
description: A comprehensive quiz application with CRUD, authentication, and animations
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # UI
  cupertino_icons: ^1.0.6
  # Audio
  audioplayers: ^6.1.0
  # Database SQLite
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.4.0+3
  path: ^1.9.0
  path_provider: ^2.1.0
  
  # Animation
  lottie: ^3.1.0
  confetti: ^0.7.0
  
  # State Management
  provider: ^6.1.1
  
  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sound/betul.wav
    - assets/sound/salah.wav
    - assets/sound/bg_music.wav
    - assets/animations/Quiz.json